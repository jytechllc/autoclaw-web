  <circle cx="39.4" cy="29.4" r="2.1" fill="#fb7185" opacity="0.55"/>

  <!-- Bright, lively eyes (looking up, with catchlights) -->
  <circle cx="28" cy="24.6" r="2.7" fill="#fff7ed"/>
  <circle cx="36" cy="24.6" r="2.7" fill="#fff7ed"/>
  <circle cx="28.2" cy="24.0" r="1.35" fill="#111827"/>
  <circle cx="36.2" cy="24.0" r="1.35" fill="#111827"/>
  <circle cx="27.6" cy="23.4" r="0.62" fill="#ffffff"/>
  <circle cx="35.6" cy="23.4" r="0.62" fill="#ffffff"/>

