<!doctype html>
<!--
  Offline / connection-error page for the AutoClaw desktop shell. Shown by
  electron/main.js when a main-frame load fails (no network, DNS failure, server
  unreachable). The main process keeps retrying the hosted URL on a timer; this
  page also fires an immediate retry the moment the OS reports the network is
  back (navigator 'online') and offers a manual "Retry now" button. No remote
  resources — must render fully offline.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src 'self'; style-src 'unsafe-inline'; script-src 'unsafe-inline';" />
    <title>AutoClaw — Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        background: #0b0b0f;
        color: #e6e6ea;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
        -webkit-user-select: none;
      }
      .card {
        width: 100%;
        max-width: 380px;
        padding: 0 32px;
        text-align: center;
      }
      .icon {
        width: 56px;
        height: 56px;
        margin: 0 auto 22px;
        color: #ff3b30;
        filter: drop-shadow(0 0 8px rgba(255, 59, 48, 0.4));
      }
      h1 {
        margin: 0 0 10px;
        font-size: 19px;
        font-weight: 600;
      }
      p {
        margin: 0 0 24px;
        font-size: 13.5px;
        line-height: 1.55;
        color: #9a9aa6;
      }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        font-size: 12.5px;
        color: #9a9aa6;
        margin-bottom: 24px;
      }
      .dot {
        width: 14px;
        height: 14px;
        border: 2px solid rgba(255, 59, 48, 0.18);
        border-top-color: #ff3b30;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      button {
        appearance: none;
        border: 1px solid rgba(255, 59, 48, 0.55);
        background: transparent;
        color: #ff3b30;
        font-size: 13.5px;
        font-weight: 600;
        padding: 9px 22px;
        border-radius: 9px;
        cursor: pointer;
        box-shadow: 0 0 12px rgba(255, 59, 48, 0.25);
        transition: background 0.15s ease, border-color 0.15s ease,
          box-shadow 0.15s ease;
      }
      button:hover {
        background: rgba(255, 59, 48, 0.12);
        border-color: #ff3b30;
        box-shadow: 0 0 16px rgba(255, 59, 48, 0.4);
      }
      button:disabled {
        opacity: 0.55;
        cursor: default;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M1 1l22 22" />
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
        <path d="M10.71 5.05A16 16 0 0 1 22.58 9" />
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
        <line x1="12" y1="20" x2="12.01" y2="20" />
      </svg>
      <h1 id="title-text">Can't reach AutoClaw</h1>
      <p id="desc">You appear to be offline, or the AutoClaw service is temporarily unavailable. Your session is safe — the app will reconnect on its own.</p>
      <div class="status">
        <span class="dot" aria-hidden="true"></span>
        <span id="status-text">Trying to reconnect…</span>
      </div>
      <div>
        <button id="retry">Retry now</button>
      </div>
    </div>
    <script>
      // Localize the page. main.js passes ?lang=<locale> (resolved from the
      // app's language); fall back to the OS/browser language, then English.
      const I18N = {
        en: {
          title: "AutoClaw — Offline",
          heading: "Can't reach AutoClaw",
          desc: "You appear to be offline, or the AutoClaw service is temporarily unavailable. Your session is safe — the app will reconnect on its own.",
          trying: "Trying to reconnect…",
          reconnecting: "Reconnecting…",
          retry: "Retry now",
        },
        zh: {
          title: "AutoClaw — 离线",
          heading: "无法连接 AutoClaw",
          desc: "您似乎已离线，或 AutoClaw 服务暂时不可用。您的会话已安全保存——应用会自动重新连接。",
          trying: "正在尝试重新连接…",
          reconnecting: "正在重新连接…",
          retry: "立即重试",
        },
        "zh-TW": {
          title: "AutoClaw — 離線",
          heading: "無法連線至 AutoClaw",
          desc: "您似乎已離線，或 AutoClaw 服務暫時無法使用。您的工作階段已安全保存——應用程式會自動重新連線。",
          trying: "正在嘗試重新連線…",
          reconnecting: "正在重新連線…",
          retry: "立即重試",
        },
        ko: {
          title: "AutoClaw — 오프라인",
          heading: "AutoClaw에 연결할 수 없습니다",
          desc: "오프라인 상태이거나 AutoClaw 서비스를 일시적으로 사용할 수 없습니다. 세션은 안전하며 앱이 자동으로 다시 연결됩니다.",
          trying: "다시 연결하는 중…",
          reconnecting: "다시 연결하는 중…",
          retry: "지금 다시 시도",
        },
      };
      function pickLocale() {
        const q = new URLSearchParams(location.search).get("lang");
        if (I18N[q]) return q;
        const raw = (q || navigator.language || "en").toLowerCase();
        if (raw === "zh-tw" || raw.startsWith("zh-hant")) return "zh-TW";
        if (raw.startsWith("zh")) return "zh";
        if (raw.startsWith("ko")) return "ko";
        return "en";
      }
      const t = I18N[pickLocale()];
      document.documentElement.lang = pickLocale();
      document.title = t.title;
      document.getElementById("title-text").textContent = t.heading;
      document.getElementById("desc").textContent = t.desc;

      // The native bridge (window.autoclawDesktop) is injected by preload.js and
      // is always present inside the shell; guard anyway so the page is harmless
      // if ever opened standalone.
      const bridge = window.autoclawDesktop;
      const btn = document.getElementById("retry");
      const statusText = document.getElementById("status-text");
      statusText.textContent = t.trying;
      btn.textContent = t.retry;

      function retry() {
        if (!bridge || typeof bridge.retry !== "function") return;
        btn.disabled = true;
        statusText.textContent = t.reconnecting;
        bridge.retry();
        // The main process navigates away on success; if it fails the page is
        // re-shown fresh, so just re-enable shortly in case the load is slow.
        setTimeout(() => {
          btn.disabled = false;
          statusText.textContent = t.trying;
        }, 4000);
      }

      btn.addEventListener("click", retry);
      // The OS regained connectivity — retry immediately instead of waiting for
      // the main-process timer.
      window.addEventListener("online", retry);
    </script>
  </body>
</html>
