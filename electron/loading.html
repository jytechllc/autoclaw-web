<!doctype html>
<!--
  Startup splash for the AutoClaw desktop shell. Shown locally the instant the
  window opens and stays visible until the hosted app paints (or fails), so cold
  start is never a blank window. No remote resources — must render fully offline.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src 'self' file:; style-src 'unsafe-inline';" />
    <title>AutoClaw</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        background: #0b0b0f;
        color: #e6e6ea;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        user-select: none;
        -webkit-user-select: none;
      }
      .logo {
        width: 72px;
        height: 72px;
        border-radius: 16px;
        opacity: 0;
        animation: fade-in 0.4s ease forwards;
      }
      .spinner {
        width: 26px;
        height: 26px;
        border: 3px solid rgba(255, 255, 255, 0.14);
        border-top-color: #6d8bff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      .label {
        font-size: 13px;
        letter-spacing: 0.02em;
        color: #9a9aa6;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes fade-in {
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <img class="logo" src="../electron-resources/icon.png" alt="AutoClaw" />
    <div class="spinner" aria-hidden="true"></div>
    <div class="label">Starting AutoClaw…</div>
  </body>
</html>
