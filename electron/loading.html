<!doctype html>
<!--
  Startup splash for the AutoClaw desktop shell. Shown locally the instant the
  window opens and stays visible until the hosted app paints (or fails), so cold
  start is never a blank window. No remote resources — must render fully offline.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src 'self' file:; style-src 'unsafe-inline'; script-src 'unsafe-inline';" />
    <title>AutoClaw</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        background: #0b0b0f;
        color: #e6e6ea;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        user-select: none;
        -webkit-user-select: none;
      }
      /* Red progress ring with the lobster logo nested in its center. */
      .ring {
        position: relative;
        width: 150px;
        height: 150px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .ring::before {
        content: "";
        position: absolute;
        inset: 0;
        border: 5px solid rgba(255, 59, 48, 0.16);
        border-top-color: #ff3b30;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
        filter: drop-shadow(0 0 6px rgba(255, 59, 48, 0.45));
      }
      .logo {
        width: 98px;
        height: 98px;
        border-radius: 16px;
        opacity: 0;
        animation: fade-in 0.4s ease forwards;
      }
      .status {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }
      .label {
        font-size: 16px;
        letter-spacing: 0.02em;
        color: #f2f2f5;
      }
      /* Big tabular-nums percent that eases up toward ~90% while the hosted app
         paints. It is a visual reassurance, not a measured value, so it never
         claims to hit 100% — the real page replaces this splash on load. */
      .percent {
        font-size: 30px;
        font-weight: 500;
        line-height: 1;
        color: #8a8a96;
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.01em;
      }
      .sub {
        font-size: 13.5px;
        letter-spacing: 0.02em;
        color: #6a6a76;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes fade-in {
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="ring" aria-hidden="true">
      <img class="logo" src="../electron-resources/icon.png" alt="AutoClaw" />
    </div>
    <div class="status">
      <div class="label" id="label">Starting AutoClaw…</div>
      <div class="percent" id="pct">0%</div>
      <div class="sub" id="sub">Almost ready…</div>
    </div>
    <script>
      // Localize the splash. main.js passes ?lang=<locale> (resolved from the
      // app's language); fall back to the OS/browser language, then English.
      const I18N = {
        en: { label: "Starting AutoClaw…", sub: "Almost ready…" },
        zh: { label: "正在启动 AutoClaw…", sub: "即将就绪…" },
        "zh-TW": { label: "正在啟動 AutoClaw…", sub: "即將就緒…" },
        ko: { label: "AutoClaw 시작 중…", sub: "거의 준비되었습니다…" },
      };
      function pickLocale() {
        const q = new URLSearchParams(location.search).get("lang");
        const raw = (q || navigator.language || "en").toLowerCase();
        if (I18N[q]) return q;
        if (raw === "zh-tw" || raw.startsWith("zh-hant")) return "zh-TW";
        if (raw.startsWith("zh")) return "zh";
        if (raw.startsWith("ko")) return "ko";
        return "en";
      }
      const t = I18N[pickLocale()];
      document.documentElement.lang = pickLocale();
      document.getElementById("label").textContent = t.label;
      document.getElementById("sub").textContent = t.sub;

      // Smoothly ease the percentage toward a 90% ceiling: fast at first, then
      // asymptotically slower, so it always feels like progress but never stalls
      // at a number that pretends the load finished. The hosted page swaps this
      // splash out the moment it paints.
      const CEILING = 90;
      const pct = document.getElementById("pct");
      let current = 0;
      setInterval(() => {
        current += (CEILING - current) * 0.04;
        pct.textContent = Math.min(CEILING, Math.round(current)) + "%";
      }, 80);
    </script>
  </body>
</html>
