appId: us.jytech.autoclaw
productName: AutoClaw
copyright: Copyright © jytech

# The desktop app is a remote shell — it bundles only electron/ + the icon and
# uses no native node modules at runtime, so skip rebuilding native deps. This
# also avoids needing a C toolchain on the build host.
npmRebuild: false

# Two-package.json structure: electron/ is the packaged app root with its own
# package.json, so electron-builder collects only the desktop runtime deps
# (electron-updater) instead of the whole web dependency tree (next, @aws-sdk,
# stripe, …) from the repo root. electron/node_modules must be installed before
# building (`npm install --prefix electron`). The desktop version is
# electron/package.json's `version`; the root version stays the web app's.
directories:
  output: dist-electron
  buildResources: electron-resources
  app: electron

# Relative to electron/ (the app directory). node_modules is handled by the
# dependency collector, not these globs.
files:
  - "**/*"
  - "!make-icon.js"
  - "!package-lock.json"

# Tray/window icon, read at runtime from process.resourcesPath (see
# iconPath() in electron/main.js). Path is relative to the repo root.
extraResources:
  - from: electron-resources/icon.png
    to: icon.png

# Auto-update feed (electron-updater reads this via the app-update.yml that
# electron-builder bakes into the package). Served from Cloudflare R2 rather
# than GitHub Releases: Windows is the China-market channel, where github.com is
# slow or blocked outright, and R2 has no egress fees (these are ~300MB
# downloads). The CI workflow uploads latest.yml + the installer + its blockmap
# to this prefix on every release, overwriting the previous build. latest.yml
# names its installer by a *relative* url, so the yml and the .exe it points at
# must live at this same prefix — and the trailing slash matters, since file
# names resolve relative to this URL.
#
# NOTE: this is R2's *development* URL, which Cloudflare rate-limits and does
# not recommend for production. Bind a custom domain (e.g. dl.jytech.us) to the
# `autoclaw` bucket and swap it in here before this sees real download volume.
publish:
  provider: generic
  url: https://pub-200e7b105f264829800e0695974532d2.r2.dev/desktop/latest/

# Windows first (primary target for the China-market channel).
win:
  target:
    - target: nsis
      arch: [x64]
    # Portable ("U 盘版") is built ia32 on purpose: a 32-bit exe runs on every
    # Windows (32- and 64-bit), so one file works on any machine you plug the
    # drive into. The app is a thin remote shell, so 32-bit costs nothing here.
    - target: portable
      arch: [ia32]

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: AutoClaw
  artifactName: ${productName}-${version}-Setup.${ext}

portable:
  artifactName: ${productName}-${version}-Portable.${ext}

# macOS. Built on a macos runner (see the build-macos job) — it can't be
# cross-compiled from the Windows runner.
#
# Two separate dmgs rather than one universal binary: a universal dmg bundles
# both slices, so every user downloads ~2x the bytes to run one of them. These
# are ~300MB shells over a slow-in-China link, so the split is worth the extra
# artifact.
#
# `identity: null` builds unsigned — there's no Apple Developer ID cert yet.
# Consequences, both handled elsewhere: Gatekeeper quarantines the app on first
# open (the download page tells users how to get past it), and electron-updater
# refuses to self-update an unsigned mac app (updaterSupported() in
# electron/main.js already returns false on darwin, so it never tries).
mac:
  target:
    - target: dmg
      arch: [arm64, x64]
  category: public.app-category.business
  identity: null

dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}

linux:
  target: AppImage
  category: Office
