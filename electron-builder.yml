appId: us.jytech.autoclaw
productName: AutoClaw
copyright: Copyright © jytech

# The desktop app is a remote shell — it bundles only electron/ + the icon and
# uses no native node modules at runtime, so skip rebuilding native deps. This
# also avoids needing a C toolchain on the build host.
npmRebuild: false

# Two-package.json structure: electron/ is the packaged app root with its own
# package.json, so electron-builder collects only the desktop runtime deps
# (electron-updater) instead of the whole web dependency tree (next, @aws-sdk,
# stripe, …) from the repo root. electron/node_modules must be installed before
# building (`npm install --prefix electron`). The desktop version is
# electron/package.json's `version`; the root version stays the web app's.
directories:
  output: dist-electron
  buildResources: electron-resources
  app: electron

# Relative to electron/ (the app directory). node_modules is handled by the
# dependency collector, not these globs.
files:
  - "**/*"
  - "!make-icon.js"
  - "!package-lock.json"

# Tray/window icon, read at runtime from process.resourcesPath (see
# iconPath() in electron/main.js). Path is relative to the repo root.
extraResources:
  - from: electron-resources/icon.png
    to: icon.png

# Auto-update feed (electron-updater reads this via the app-update.yml that
# electron-builder bakes into the package). The `generic` provider is used
# instead of `github` on purpose: our release tags are `desktop-vX.Y.Z`, which
# the github provider can't parse as versions, while this URL always redirects
# to the newest release's assets regardless of tag naming. The CI workflow
# uploads latest.yml + the installer + its blockmap next to each release.
# The trailing slash matters — file names are resolved relative to this URL.
publish:
  provider: generic
  url: https://github.com/jytechllc/autoclaw-web/releases/latest/download/

# Windows first (primary target for the China-market channel).
win:
  target:
    - target: nsis
      arch: [x64]
    # Portable ("U 盘版") is built ia32 on purpose: a 32-bit exe runs on every
    # Windows (32- and 64-bit), so one file works on any machine you plug the
    # drive into. The app is a thin remote shell, so 32-bit costs nothing here.
    - target: portable
      arch: [ia32]

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: AutoClaw
  artifactName: ${productName}-${version}-Setup.${ext}

portable:
  artifactName: ${productName}-${version}-Portable.${ext}

# Secondary targets (built on their native OS / CI).
mac:
  target: dmg
  category: public.app-category.business

linux:
  target: AppImage
  category: Office
