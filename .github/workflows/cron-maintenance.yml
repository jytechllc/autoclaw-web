name: Cron Maintenance

on:
  schedule:
    - cron: "*/10 * * * *"
    - cron: "*/30 * * * *"
    - cron: "20 * * * *"
    - cron: "0 3 * * *"
    - cron: "15 3 * * *"
    - cron: "5,35 * * * *"
    - cron: "0 4 * * *"
    - cron: "30 3 * * *"
    - cron: "30 4 * * *"
    - cron: "40 * * * *"      # hourly :40  - google-ads-sync
    - cron: "45 3 * * *"      # daily 03:45 - google-ads-reconcile
    - cron: "25 * * * *"      # hourly :25  - dispatch-followups
    - cron: "0 6 * * *"       # daily 06:00 - sync-email-stats
  workflow_dispatch:
    inputs:
      task:
        description: "Optional single task to run"
        required: false
        type: choice
        options:
          - sync-openclaw
          - run-agents
          - process-embeddings
          - audit-retention
          - key-cleanup
          - daily-cleanup
          - post-scheduler
          - enrich-contacts
          - sync-billing
          - google-ads-sync
          - google-ads-reconcile
          - dispatch-followups
          - sync-email-stats

jobs:
  cron:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate configuration
        env:
          AUTOCLAW_BASE_URL: ${{ vars.AUTOCLAW_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          test -n "$AUTOCLAW_BASE_URL"
          test -n "$CRON_SECRET"

      - name: Run sync-openclaw
        if: (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'sync-openclaw') || (github.event_name == 'schedule' && github.event.schedule == '*/10 * * * *')
        env:
          AUTOCLAW_BASE_URL: ${{ vars.AUTOCLAW_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail --show-error --silent \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${AUTOCLAW_BASE_URL}/api/cron/sync-openclaw"

      - name: Run run-agents
        if: (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'run-agents') || (github.event_name == 'schedule' && github.event.schedule == '*/30 * * * *')
        env:
          AUTOCLAW_BASE_URL: ${{ vars.AUTOCLAW_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail --show-error --silent \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${AUTOCLAW_BASE_URL}/api/cron/run-agents"

      - name: Run process-embeddings
        if: (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'process-embeddings') || (github.event_name == 'schedule' && github.event.schedule == '20 * * * *')
        env:
          AUTOCLAW_BASE_URL: ${{ vars.AUTOCLAW_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail --show-error --silent \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${AUTOCLAW_BASE_URL}/api/cron/process-embeddings"

      - name: Run audit-retention
        if: (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'audit-retention') || (github.event_name == 'schedule' && github.event.schedule == '0 3 * * *')
        env:
          AUTOCLAW_BASE_URL: ${{ vars.AUTOCLAW_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail --show-error --silent \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${AUTOCLAW_BASE_URL}/api/cron/audit-retention"

      - name: Run key-cleanup
        if: (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'key-cleanup') || (github.event_name == 'schedule' && github.event.schedule == '15 3 * * *')
        env:
          AUTOCLAW_BASE_URL: ${{ vars.AUTOCLAW_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail --show-error --silent \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${AUTOCLAW_BASE_URL}/api/cron/key-cleanup"

      - name: Run daily-cleanup
        if: (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'daily-cleanup') || (github.event_name == 'schedule' && github.event.schedule == '30 3 * * *')
        env:
          AUTOCLAW_BASE_URL: ${{ vars.AUTOCLAW_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail --show-error --silent \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${AUTOCLAW_BASE_URL}/api/cron/daily-cleanup"

      - name: Run post-scheduler
        if: (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'post-scheduler') || (github.event_name == 'schedule' && github.event.schedule == '5,35 * * * *')
        env:
          AUTOCLAW_BASE_URL: ${{ vars.AUTOCLAW_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail --show-error --silent \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${AUTOCLAW_BASE_URL}/api/cron/post-scheduler"

      - name: Run sync-billing
        if: (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'sync-billing') || (github.event_name == 'schedule' && github.event.schedule == '30 4 * * *')
        env:
          AUTOCLAW_BASE_URL: ${{ vars.AUTOCLAW_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail --show-error --silent \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${AUTOCLAW_BASE_URL}/api/cron/sync-billing"

      - name: Run enrich-contacts
        if: (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'enrich-contacts') || (github.event_name == 'schedule' && github.event.schedule == '0 4 * * *')
        env:
          AUTOCLAW_BASE_URL: ${{ vars.AUTOCLAW_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail --show-error --silent \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${AUTOCLAW_BASE_URL}/api/cron/enrich-contacts"

      - name: Run google-ads-sync
        if: (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'google-ads-sync') || (github.event_name == 'schedule' && github.event.schedule == '40 * * * *')
        env:
          AUTOCLAW_BASE_URL: ${{ vars.AUTOCLAW_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail --show-error --silent \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${AUTOCLAW_BASE_URL}/api/cron/google-ads-sync"

      - name: Run google-ads-reconcile
        if: (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'google-ads-reconcile') || (github.event_name == 'schedule' && github.event.schedule == '45 3 * * *')
        env:
          AUTOCLAW_BASE_URL: ${{ vars.AUTOCLAW_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail --show-error --silent \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${AUTOCLAW_BASE_URL}/api/cron/google-ads-reconcile"

      - name: Run dispatch-followups
        if: (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'dispatch-followups') || (github.event_name == 'schedule' && github.event.schedule == '25 * * * *')
        env:
          AUTOCLAW_BASE_URL: ${{ vars.AUTOCLAW_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail --show-error --silent \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${AUTOCLAW_BASE_URL}/api/cron/dispatch-followups"

      - name: Run sync-email-stats
        if: (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'sync-email-stats') || (github.event_name == 'schedule' && github.event.schedule == '0 6 * * *')
        env:
          AUTOCLAW_BASE_URL: ${{ vars.AUTOCLAW_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail --show-error --silent \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${AUTOCLAW_BASE_URL}/api/cron/sync-email-stats"
