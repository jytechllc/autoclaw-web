name: typecheck

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # electron 42 / @electron/rebuild require Node >=22.12 — npm ci on
          # Node 20 trips EBADENGINE. Keep in sync with local dev + Vercel.
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck
