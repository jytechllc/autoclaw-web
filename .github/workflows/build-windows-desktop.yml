name: Build Desktop

# Builds the AutoClaw Electron desktop apps — Windows installers (.exe) and macOS
# disk images (.dmg) — then publishes them as a GitHub Release and uploads them to
# R2, which is what the download page and the auto-updater actually read. Trigger
# manually, or it runs when the desktop-related files change on any branch.
#
# Shape: the two builds fan out in parallel on their native runners (macOS cannot
# be cross-compiled from the Windows runner), then a single `release` job collects
# both sets of artifacts and publishes once. Publishing is deliberately *not* done
# inside the build jobs: two jobs each doing create-or-update on the same tag race
# each other — both check "does the release exist", both see no, both POST, and one
# loses with a 422. Funnelling it through one job removes the race without making
# macOS wait for Windows (and without Windows failing meaning macOS never builds).
#
# The file keeps its build-windows-desktop.yml name: renaming it would change the
# `paths` trigger below and start a fresh workflow in the Actions history.
on:
  workflow_dispatch:
  push:
    branches: ["**"]
    paths:
      - "electron/**"
      - "electron-resources/**"
      - "electron-builder.yml"
      - ".github/workflows/build-windows-desktop.yml"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      # Skip electron-builder code signing (no cert configured yet).
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            electron/package-lock.json

      # Root install brings the build tooling (electron, electron-builder);
      # electron/ install brings the app's runtime deps (electron-updater),
      # which is all that gets packed into the asar (two-package.json
      # structure, see electron-builder.yml).
      - name: Install dependencies
        run: |
          npm install --no-audit --no-fund
          npm install --prefix electron --no-audit --no-fund

      - name: Build Windows installers
        run: npm run electron:build:win

      # latest.yml is the electron-updater feed and *.blockmap powers differential
      # downloads, so both ship alongside the installers.
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: |
            dist-electron/*.exe
            dist-electron/*.blockmap
            dist-electron/latest.yml
          if-no-files-found: error
          retention-days: 30

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            electron/package-lock.json

      - name: Install dependencies
        run: |
          npm install --no-audit --no-fund
          npm install --prefix electron --no-audit --no-fund

      # Unsigned (identity: null in electron-builder.yml) — no Apple Developer ID
      # cert yet. Builds a separate dmg per arch: arm64 and x64.
      - name: Build macOS disk images
        run: npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      # No latest-mac.yml: electron-updater can't self-update an unsigned mac app,
      # so there is no feed to publish (updaterSupported() in electron/main.js
      # returns false on darwin). Mac users re-download.
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: dist-electron/*.dmg
          if-no-files-found: error
          retention-days: 30

  # Single publisher. Runs once both builds are done, so the release is created
  # exactly once with every asset already in hand.
  release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]

    steps:
      # Only needed to read the desktop version, which lives in
      # electron/package.json (the packaged app root), not the web app's root
      # package.json.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: electron/package.json
          sparse-checkout-cone-mode: false

      - name: Read app version
        id: pkg
        run: echo "version=$(node -p "require('./electron/package.json').version")" >> "$GITHUB_OUTPUT"

      # Both artifacts land flat in dist/, matching the layout electron-builder
      # produced — which is what the R2 upload below expects.
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: desktop-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist

      # Created as a draft first, then flipped live in a separate step: while
      # assets are still uploading, releases/latest keeps pointing at the previous
      # version, so an app checking mid-publish can never see a latest.yml whose
      # installer isn't uploaded yet.
      - name: Create draft release with assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-v${{ steps.pkg.outputs.version }}
          name: AutoClaw Desktop v${{ steps.pkg.outputs.version }}
          draft: true
          body: |
            AutoClaw desktop build (automated).

            **Windows**
            - **AutoClaw-${{ steps.pkg.outputs.version }}-Portable.exe** — portable / no-install, double-click to run (32-bit, runs on any 32/64-bit Windows). Login session and cache live in an `AutoClaw-Data/` folder next to the .exe, so copy it to a USB drive to carry it between machines without re-logging in or leaving traces on the host.
            - **AutoClaw-${{ steps.pkg.outputs.version }}-Setup.exe** — installer (writes to the local %APPDATA%). Auto-updates itself from newer releases; portable builds must be re-downloaded manually.

            **macOS** (unsigned — right-click the app and choose Open on first launch; does not auto-update)
            - **AutoClaw-${{ steps.pkg.outputs.version }}-arm64.dmg** — Apple Silicon (M1/M2/M3/M4).
            - **AutoClaw-${{ steps.pkg.outputs.version }}-x64.dmg** — Intel Macs.

            Not code-signed yet: on Windows, if SmartScreen blocks the first run, click "More info → Run anyway".
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.blockmap
            dist/latest.yml

      # gh has no built-in retry, and a transient network error here would strand
      # the release as an invisible draft — so retry a few times.
      - name: Publish release
        run: |
          for attempt in 1 2 3; do
            if gh release edit "desktop-v${{ steps.pkg.outputs.version }}" --draft=false --latest --repo "${{ github.repository }}"; then
              exit 0
            fi
            echo "publish attempt ${attempt} failed; retrying in 15s..."
            sleep 15
          done
          exit 1
        env:
          GH_TOKEN: ${{ github.token }}

      # R2 is the real download + auto-update source: Windows is the China-market
      # channel, where github.com is slow or blocked, and R2 charges no egress on
      # these large installers. The GitHub Release above is kept as an archive /
      # changelog, but the download page and electron-updater both read from this
      # bucket (see electron-builder.yml `publish`).
      #
      # R2 speaks the S3 API, so the aws CLI works with --endpoint-url. Region must
      # be `auto`.
      #
      # Two prefixes: an immutable desktop-v<version>/ for permalinks, and latest/
      # — the updater feed — which is overwritten each release. latest.yml is
      # written LAST, because it is the pointer that makes a build live: an app
      # polling mid-upload must never see a latest.yml whose installer isn't there
      # yet. It's also sent no-cache so updaters don't sit on a stale version.
      - name: Upload release to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          ENDPOINT: ${{ secrets.R2_DEFAULT_S3_ENDPOINT }}
          BUCKET: autoclaw
          VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          set -euo pipefail
          for prefix in "desktop/desktop-v${VERSION}" "desktop/latest"; do
            # dist/ is flat (the build jobs only ever uploaded the finished
            # artifacts, never electron-builder's unpacked app trees), but the
            # trailing --exclude "*/*" keeps it that way if that ever changes:
            # those trees contain their own .exe files and must not go public.
            aws s3 cp dist/ "s3://${BUCKET}/${prefix}/" \
              --endpoint-url "${ENDPOINT}" \
              --recursive --exclude "*" \
              --include "*.exe" --include "*.dmg" --include "*.blockmap" \
              --exclude "*/*" \
              --only-show-errors
            aws s3 cp dist/latest.yml "s3://${BUCKET}/${prefix}/latest.yml" \
              --endpoint-url "${ENDPOINT}" \
              --content-type text/yaml --cache-control no-cache --only-show-errors
            echo "uploaded -> ${prefix}/"
          done
