name: Build Windows Desktop

# Builds the AutoClaw Electron desktop installer (.exe) on a Windows runner and
# publishes it as a downloadable GitHub Release. Trigger manually, or it runs
# when the desktop-related files change on any branch.
on:
  workflow_dispatch:
  push:
    branches: ["**"]
    paths:
      - "electron/**"
      - "electron-resources/**"
      - "electron-builder.yml"
      - ".github/workflows/build-windows-desktop.yml"

# Needed for the release step to create/update a GitHub Release.
permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      # Skip electron-builder code signing (no cert configured yet).
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            electron/package-lock.json

      # Root install brings the build tooling (electron, electron-builder);
      # electron/ install brings the app's runtime deps (electron-updater),
      # which is all that gets packed into the asar (two-package.json
      # structure, see electron-builder.yml).
      - name: Install dependencies
        run: |
          npm install --no-audit --no-fund
          npm install --prefix electron --no-audit --no-fund

      - name: Build Windows installer
        run: npm run electron:build:win

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoClaw-Windows
          path: |
            dist-electron/*.exe
            dist-electron/*.blockmap
            dist-electron/latest.yml
          if-no-files-found: error
          retention-days: 30

      # Read the app version so the release can be tagged with it. The desktop
      # version lives in electron/package.json (the packaged app root), not the
      # web app's root package.json.
      - name: Read app version
        id: pkg
        shell: bash
        run: echo "version=$(node -p "require('./electron/package.json').version")" >> "$GITHUB_OUTPUT"

      # Publish to a GitHub Release so it can be downloaded straight from the
      # repo's Releases section — no login, no 30-day expiry. The release also
      # serves as the auto-update feed: installed apps poll
      # releases/latest/download/latest.yml (see `publish` in
      # electron-builder.yml), so latest.yml and the *.blockmap (differential
      # download) must be uploaded alongside the installers.
      #
      # Created as a draft first, then flipped live in a separate step: while
      # assets are still uploading, releases/latest keeps pointing at the
      # previous version, so an app checking mid-publish can never see a
      # latest.yml whose installer isn't uploaded yet.
      - name: Create draft release with assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-v${{ steps.pkg.outputs.version }}
          name: AutoClaw Desktop v${{ steps.pkg.outputs.version }} (Windows)
          draft: true
          body: |
            AutoClaw Windows desktop build (automated).

            - **AutoClaw-${{ steps.pkg.outputs.version }}-Portable.exe** — portable / no-install, double-click to run (32-bit, runs on any 32/64-bit Windows). Login session and cache live in an `AutoClaw-Data/` folder next to the .exe, so copy it to a USB drive to carry it between machines without re-logging in or leaving traces on the host.
            - **AutoClaw-${{ steps.pkg.outputs.version }}-Setup.exe** — installer (writes to the local %APPDATA%). Auto-updates itself from newer releases; portable builds must be re-downloaded manually.

            Not code-signed yet: if SmartScreen blocks the first run, click "More info → Run anyway".
          files: |
            dist-electron/*.exe
            dist-electron/*.blockmap
            dist-electron/latest.yml

      # gh has no built-in retry, and a transient network error here would
      # strand the release as an invisible draft — so retry a few times.
      - name: Publish release
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if gh release edit "desktop-v${{ steps.pkg.outputs.version }}" --draft=false --latest --repo "${{ github.repository }}"; then
              exit 0
            fi
            echo "publish attempt ${attempt} failed; retrying in 15s..."
            sleep 15
          done
          exit 1
        env:
          GH_TOKEN: ${{ github.token }}

      # R2 is the real download + auto-update source: Windows is the China-market
      # channel, where github.com is slow or blocked, and R2 charges no egress on
      # these ~300MB downloads. The GitHub Release above is kept as an archive /
      # changelog, but the download page and electron-updater both read from this
      # bucket (see electron-builder.yml `publish`).
      #
      # R2 speaks the S3 API, so the aws CLI works with --endpoint-url. Region
      # must be `auto`.
      #
      # Two prefixes: an immutable desktop-v<version>/ for permalinks, and
      # latest/ — the updater feed — which is overwritten each release. latest.yml
      # is written LAST, because it is the pointer that makes a build live: an app
      # polling mid-upload must never see a latest.yml whose installer isn't there
      # yet. It's also sent with no-cache so updaters don't sit on a stale version.
      - name: Upload release to R2
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          ENDPOINT: ${{ secrets.R2_DEFAULT_S3_ENDPOINT }}
          BUCKET: autoclaw
          VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          set -euo pipefail
          for prefix in "desktop/desktop-v${VERSION}" "desktop/latest"; do
            aws s3 cp dist-electron/ "s3://${BUCKET}/${prefix}/" \
              --endpoint-url "${ENDPOINT}" \
              --recursive --exclude "*" --include "*.exe" --include "*.blockmap" \
              --only-show-errors
            aws s3 cp dist-electron/latest.yml "s3://${BUCKET}/${prefix}/latest.yml" \
              --endpoint-url "${ENDPOINT}" \
              --content-type text/yaml --cache-control no-cache --only-show-errors
            echo "uploaded -> ${prefix}/"
          done
